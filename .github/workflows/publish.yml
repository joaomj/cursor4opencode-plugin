name: Publish

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      provenance:
        description: Publish with npm provenance
        type: boolean
        default: true
        required: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node --check src/index.js

  publish:
    needs: [verify]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish --provenance --tag next --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "published ${PKG_NAME}@${PKG_VER} to dist-tag 'next'"
          echo "Will promote to 'latest' after 7-day quarantine"
